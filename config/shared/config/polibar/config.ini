[colors]
bg = #222436
bg-dark = #1e2030
bg-highlight = #2f334d
fg = #c8d3f5
fg-dark = #3b4261
yellow = #ffc777
red = #ff757f
green = #4fd6be
purple = #fca7ea
blue = #65bcff

[bar/main]
width = 100%
height = 30
background = ${colors.bg}
foreground = ${colors.fg}
font-0 = "Fira Code Nerd Font:size=12;2"

module-margin = 1
padding-left = 1
padding-right = 1

modules-left = battery network pulseaudio power-profiles i3
modules-center = date
modules-right = tray

[module/i3]
type = internal/i3
pin-workspaces = false
show-urgent = true
strip-wsnumbers = true
index-sort = true

ws-icon-0 = 1;
ws-icon-1 = 2;
ws-icon-2 = 3;
ws-icon-3 = 4;
ws-icon-4 = 5;
ws-icon-5 = 6;
ws-icon-6 = 7;
ws-icon-7 = 8;
ws-icon-8 = 9;󰵀
ws-icon-9 = 10;
ws-icon-default = 󰊚

label-focused = %icon%  %name%
label-focused-foreground = ${colors.purple}
label-focused-padding = 1

label-unfocused = %icon%  %name%
label-unfocused-padding = 1

label-urgent = %icon%  %name%
label-urgent-foreground = ${colors.red}
label-urgent-padding = 1

[module/battery]
type = internal/battery
full-at = 99
low-at = 20
battery = BAT0
adapter = ADP1
poll-interval = 5

format-charging =   <label-charging>
format-charging-foreground = ${colors.green}
format-discharging = <ramp-capacity>
format-full = <ramp-capacity>
format-low = <ramp-capacity>
format-low-foreground = ${colors.red}

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 

[module/network]
type = internal/network
interface-type = wireless
interval = 3

format-connected = %{A1:alacritty -e nmtui:}<ramp-signal>%{A}
format-disconnected = %{A1:alacritty -e nmtui:}󰖪%{A}
format-disconnected-foreground = ${colors.red}

ramp-signal-0 = 

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false

format-volume = %{A1:alacritty -e pulsemixer:}<ramp-volume>%{A}
label-muted = %{A1:alacritty -e pulsemixer:} %{A}

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-3 = 

[module/power-profiles]
type = custom/script
exec = p=$(powerprofilesctl get); if [ "$p" = "performance" ]; then echo "%{B#ffc777}%{F#3b4261}  %{F-}%{B-}"; elif [ "$p" = "power-saver" ]; then echo "%{B#4fd6be}%{F#3b4261} 󱤆 %{F-}%{B-}"; else echo "%{B#65bcff}%{F#3b4261} 󰗑 %{F-}%{B-}"; fi
interval = 5

[module/date]
type = internal/date
interval = 60
date = %Y-%m-%d %H:%M
label = %date%

[module/tray]
type = internal/tray
tray-spacing = 8px
tray-size = 20
