
# NOTE: to inspect the class name
# xprop WM_CLASS WM_NAME
assign [class="^LibreWolf$"] $ws_web
assign [class="^librewolf$"] $ws_web

assign [class="^Wasistlos$"] $ws_chat
assign [class="^TelegramDesktop$"] $ws_chat

assign [class="^krita$"] $ws_aux
assign [class="^Gimp$"] $ws_aux

assign [class="^steam$"] $ws_steam

# for_window [class="^steam$"] floating enable, move position center
# for_window [title="^(Friends|Settings|.*Steam.*)$"] floating enable, move position center
# for_window [class="^steam_app_.*$"] move to workspace $ws_game, fullscreen enable
# for_window [class="^Unity$"] floating enable
# for_window [class="^zoom$"] floating enable

for_window [class="^flameshot$"] floating enable, move position center
for_window [class="^mpv$"] floating enable, move position center
for_window [class="^PureRef$"] floating enable

for_window [class="^floating_calc$"] floating enable, resize set 40 ppt 60 ppt, move position center
for_window [class="^floating_mixer$"] floating enable, resize set 70 ppt 50 ppt, move position center
for_window [class="^floating_scratchpad$"] floating enable, resize set 80 ppt 60 ppt, move position center
for_window [class="^floating_notes$"] floating enable, resize set 80 ppt 90 ppt, move position center
# for_window [class="^file_manager$"] floating enable, resize set 90 ppt 80 ppt, move position center

for_window [workspace=$ws_chat] layout tabbed
for_window [workspace=$ws_aux] layout tabbed

